<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Algobets Ai — 7-Agent Sports Betting System</title>
  <meta name="description" content="AI-powered sports betting edge finder. 7 autonomous agents scan odds across 6+ sportsbooks to find +EV bets." />
  <meta property="og:title" content="Algobets Ai — 7-Agent Sports Betting Edge Finder" />
  <meta property="og:description" content="7 autonomous AI agents scan 6+ sportsbooks in real time to surface high-confidence, +EV bets." />
  <meta property="og:image" content="https://algobets.ai/og.png" />
  <meta property="og:url" content="https://algobets.ai" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --card2: #1a2236;
      --border: #1e293b;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --lime: #c8ff00;
      --mint: #22d3ee;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --font: 'DM Sans', -apple-system, sans-serif;
      --mono: 'DM Mono', monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    body { padding-bottom: 80px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes scanBar { 0% { width: 0%; } 100% { width: 100%; } }
    .fade-in { animation: fadeIn .4s ease both; }
    .stagger-1 { animation-delay: .05s; }
    .stagger-2 { animation-delay: .1s; }
    .stagger-3 { animation-delay: .15s; }
    .stagger-4 { animation-delay: .2s; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Glass card */
    .glass { background: rgba(17,24,39,.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; }

    /* Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,14,26,.92); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 0 env(safe-area-inset-bottom, 8px); z-index: 100; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 12px; border: none; background: none; color: var(--text2); font-size: 10px; font-family: var(--font); cursor: pointer; transition: color .2s; }
    .nav-btn.active { color: var(--lime); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* Buttons */
    .btn-primary { background: var(--lime); color: #0a0e1a; border: none; border-radius: 12px; padding: 14px 24px; font-family: var(--font); font-weight: 700; font-size: 15px; cursor: pointer; transition: all .2s; width: 100%; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; color: var(--lime); border: 1.5px solid var(--lime); border-radius: 12px; padding: 12px 20px; font-family: var(--font); font-weight: 600; font-size: 14px; cursor: pointer; transition: all .2s; }
    .btn-outline:hover { background: rgba(200,255,0,.08); }

    /* Badge */
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: var(--mono); }
    .badge-green { background: rgba(16,185,129,.15); color: var(--green); }
    .badge-red { background: rgba(239,68,68,.15); color: var(--red); }
    .badge-amber { background: rgba(245,158,11,.15); color: var(--amber); }
    .badge-mint { background: rgba(34,211,238,.12); color: var(--mint); }

    /* Pick card */
    .pick-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 10px; transition: all .2s; }
    .pick-card:hover { border-color: rgba(200,255,0,.25); }

    /* Toggle */
    .toggle-row { display: flex; background: var(--card); border-radius: 12px; padding: 3px; gap: 2px; border: 1px solid var(--border); }
    .toggle-btn { flex: 1; padding: 8px 4px; border: none; background: transparent; color: var(--text2); font-family: var(--font); font-size: 12px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all .2s; }
    .toggle-btn.active { background: var(--lime); color: #0a0e1a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ─── CONFIG ─────────────────────────────────────────────────────────
    const BACKEND = "https://edgebet-backend-1.onrender.com";
    const BACKEND_API_KEY = "";
    const ODDS_KEY = "b3b4f81601f48586565146d01757a1e8";
    const BOOKS = ["draftkings","fanduel","betmgm","pinnacle","caesars","betonlineag"];
    const BOOK_NAMES = { draftkings:"DraftKings", fanduel:"FanDuel", betmgm:"BetMGM", pinnacle:"Pinnacle", caesars:"Caesars", betonlineag:"BetOnline" };

    const SPORTS = [
      { key:"basketball_nba", label:"NBA", icon:"🏀" },
      { key:"basketball_ncaab", label:"NCAAB", icon:"🏀" },
      { key:"baseball_mlb", label:"MLB", icon:"⚾" },
      { key:"icehockey_nhl", label:"NHL", icon:"🏒" },
      { key:"americanfootball_nfl", label:"NFL", icon:"🏈" },
      { key:"soccer_epl", label:"EPL", icon:"⚽" },
      { key:"soccer_usa_mls", label:"MLS", icon:"⚽" },
      { key:"mma_mixed_martial_arts", label:"UFC", icon:"🥊" },
    ];

    // ─── ICONS (inline SVGs) ────────────────────────────────────────────
    function IconScan(p) { return <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>; }
    function IconOdds(p) { return <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>; }
    function IconTracker(p) { return <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>; }
    function IconAgents(p) { return <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9 2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9 2.83-2.83"/></svg>; }
    function IconLeaderboard(p) { return <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7m11-3h1.5a2.5 2.5 0 0 1 0 5H17s0-3 2.5-5"/><path d="M12 2v8"/><path d="M8 22h8"/><path d="M12 14v8"/><rect x="5" y="10" width="14" height="4" rx="1"/></svg>; }
    function IconPlans(p) { return <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>; }

    // Signal bars SVG for empty states
    function SignalBars() {
      return (
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="36" width="6" height="8" rx="2" fill="var(--lime)" opacity=".3"/>
          <rect x="14" y="28" width="6" height="16" rx="2" fill="var(--lime)" opacity=".5"/>
          <rect x="24" y="18" width="6" height="26" rx="2" fill="var(--lime)" opacity=".7"/>
          <rect x="34" y="8" width="6" height="36" rx="2" fill="var(--lime)"/>
        </svg>
      );
    }

    // ─── HELPERS ─────────────────────────────────────────────────────────
    function americanOdds(dec) {
      if (!dec || dec <= 1) return "+100";
      return dec >= 2 ? "+" + Math.round((dec - 1) * 100) : "-" + Math.round(100 / (dec - 1));
    }

    function impliedProb(dec) {
      if (!dec || dec <= 1) return 0;
      return 1 / dec;
    }

    function edgeCalc(trueProb, bookProb) {
      if (!bookProb) return 0;
      return ((trueProb - bookProb) / bookProb * 100);
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleString("en-US", { weekday:"short", hour:"numeric", minute:"2-digit", hour12:true });
    }

    function kellySize(edge, odds, bankroll) {
      const p = edge / 100 + impliedProb(odds);
      const b = odds - 1;
      if (b <= 0 || p <= 0 || p >= 1) return 0;
      const fraction = (p * b - (1 - p)) / b;
      return Math.max(0, Math.min(fraction * 0.25 * bankroll, bankroll * 0.05));
    }

    // ─── DATA FETCHING ──────────────────────────────────────────────────
    async function fetchOdds(sportKey) {
      const url = `https://api.the-odds-api.com/v4/sports/${sportKey}/odds/?apiKey=${ODDS_KEY}&regions=us&markets=h2h,totals&oddsFormat=decimal&bookmakers=${BOOKS.join(",")}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return [];
        return await res.json();
      } catch { return []; }
    }

    // ─── 7-AGENT PIPELINE ───────────────────────────────────────────────
    function runAgentPipeline(games) {
      const picks = [];
      for (const game of games) {
        if (!game.bookmakers || !game.bookmakers.length) continue;

        // Agent 1: Data Scout — collect all book odds
        const h2hMarkets = [];
        const totalMarkets = [];
        for (const bk of game.bookmakers) {
          for (const mkt of bk.markets) {
            if (mkt.key === "h2h") {
              h2hMarkets.push({ book: bk.key, outcomes: mkt.outcomes });
            }
            if (mkt.key === "totals") {
              totalMarkets.push({ book: bk.key, outcomes: mkt.outcomes });
            }
          }
        }

        // Agent 2: Brain — consensus probability
        // Moneyline analysis
        for (const team of [game.home_team, game.away_team]) {
          const prices = [];
          const bookPrices = {};
          for (const m of h2hMarkets) {
            const oc = m.outcomes.find(o => o.name === team);
            if (oc) { prices.push(oc.price); bookPrices[m.book] = oc.price; }
          }
          if (prices.length < 3) continue;

          const pinnPrice = bookPrices["pinnacle"];
          const avgPrice = prices.reduce((a, b) => a + b, 0) / prices.length;
          const sharpPrice = pinnPrice || avgPrice;
          const trueProb = impliedProb(sharpPrice);

          // Agent 3: Edge Finder — find mispriced books
          let bestBook = null, bestPrice = 0, bestEdge = 0;
          for (const [book, price] of Object.entries(bookPrices)) {
            if (book === "pinnacle") continue;
            const bookProb = impliedProb(price);
            const edge = edgeCalc(trueProb, bookProb);
            if (edge > bestEdge) { bestEdge = edge; bestBook = book; bestPrice = price; }
          }

          // Agent 4: Vault — must pass 5% edge filter
          if (bestEdge >= 5 && bestBook) {
            const stake = kellySize(bestEdge, bestPrice, 1000);
            picks.push({
              id: game.id + "_ml_" + team,
              sport: game.sport_key,
              game: `${game.away_team} @ ${game.home_team}`,
              type: "Moneyline",
              pick: team,
              odds: americanOdds(bestPrice),
              decOdds: bestPrice,
              edge: bestEdge.toFixed(1),
              book: BOOK_NAMES[bestBook] || bestBook,
              conf: Math.min(95, 60 + bestEdge * 2).toFixed(0),
              stake: stake.toFixed(0),
              time: game.commence_time,
              trueProb: (trueProb * 100).toFixed(1),
              allBooks: bookPrices,
            });
          }
        }

        // Totals analysis
        for (const m of totalMarkets) {
          for (const oc of m.outcomes) {
            const side = oc.name; // Over or Under
            const point = oc.point;
            const prices = [];
            const bookPrices = {};
            for (const tm of totalMarkets) {
              const match = tm.outcomes.find(o => o.name === side && o.point === point);
              if (match) { prices.push(match.price); bookPrices[tm.book] = match.price; }
            }
            if (prices.length < 3) continue;

            const pinnPrice = bookPrices["pinnacle"];
            const avgPrice = prices.reduce((a, b) => a + b, 0) / prices.length;
            const sharpPrice = pinnPrice || avgPrice;
            const trueProb = impliedProb(sharpPrice);

            let bestBook = null, bestPrice = 0, bestEdge = 0;
            for (const [book, price] of Object.entries(bookPrices)) {
              if (book === "pinnacle") continue;
              const bookProb = impliedProb(price);
              const edge = edgeCalc(trueProb, bookProb);
              if (edge > bestEdge) { bestEdge = edge; bestBook = book; bestPrice = price; }
            }

            if (bestEdge >= 5 && bestBook) {
              const stake = kellySize(bestEdge, bestPrice, 1000);
              picks.push({
                id: game.id + "_tot_" + side + point,
                sport: game.sport_key,
                game: `${game.away_team} @ ${game.home_team}`,
                type: "Total",
                pick: `${side} ${point}`,
                odds: americanOdds(bestPrice),
                decOdds: bestPrice,
                edge: bestEdge.toFixed(1),
                book: BOOK_NAMES[bestBook] || bestBook,
                conf: Math.min(95, 60 + bestEdge * 2).toFixed(0),
                stake: stake.toFixed(0),
                time: game.commence_time,
                trueProb: (trueProb * 100).toFixed(1),
                allBooks: bookPrices,
              });
            }
          }
        }
      }

      // Agent 5: sort by edge, cap at 3 per night
      picks.sort((a, b) => parseFloat(b.edge) - parseFloat(a.edge));
      return picks.slice(0, 8);
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  COMPONENTS
    // ═══════════════════════════════════════════════════════════════════════

    // ─── HEADER ─────────────────────────────────────────────────────────
    function Header() {
      return (
        <div style={{ padding:"16px 20px 8px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:22, fontWeight:800, letterSpacing:"-0.5px" }}>Algo<span style={{ color:"var(--lime)" }}>Bets</span></span>
              <span style={{ fontSize:10, fontFamily:"var(--mono)", background:"var(--lime)", color:"#0a0e1a", padding:"2px 6px", borderRadius:4, fontWeight:700 }}>AI</span>
            </div>
            <div style={{ fontSize:11, color:"var(--text2)", fontFamily:"var(--mono)", marginTop:2 }}>7-Agent Edge Finder</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:"var(--green)", animation:"pulse 2s infinite" }}/>
            <span style={{ fontSize:11, color:"var(--green)", fontFamily:"var(--mono)" }}>LIVE</span>
          </div>
        </div>
      );
    }

    // ─── PICKS TAB ──────────────────────────────────────────────────────
    function PicksTab({ picks, scanning, scanStage, onScan, onTrack }) {
      return (
        <div className="fade-in" style={{ padding:"0 16px" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 0 14px" }}>
            <div>
              <div style={{ fontSize:22, fontWeight:700 }}>Today's Picks</div>
              <div style={{ fontSize:12, color:"var(--text2)" }}>{picks.length} edge{picks.length !== 1 ? "s" : ""} found</div>
            </div>
            <button className="btn-outline" onClick={onScan} disabled={scanning} style={{ padding:"10px 18px", fontSize:13 }}>
              {scanning ? "Scanning..." : "⚡ Scan Now"}
            </button>
          </div>

          {scanning && (
            <div className="glass fade-in" style={{ padding:20, marginBottom:14, textAlign:"center" }}>
              <div style={{ fontSize:13, color:"var(--mint)", fontFamily:"var(--mono)", marginBottom:10 }}>{scanStage}</div>
              <div style={{ height:4, background:"var(--card2)", borderRadius:4, overflow:"hidden" }}>
                <div style={{ height:"100%", background:"var(--lime)", borderRadius:4, animation:"scanBar 2s ease infinite" }}/>
              </div>
            </div>
          )}

          {!scanning && picks.length === 0 && (
            <div className="glass" style={{ padding:"40px 20px", textAlign:"center" }}>
              <SignalBars />
              <div style={{ fontSize:15, fontWeight:600, marginTop:12 }}>No edges found yet</div>
              <div style={{ fontSize:13, color:"var(--text2)", marginTop:4 }}>Hit Scan Now to run the 7-agent pipeline</div>
            </div>
          )}

          {picks.map((p, i) => (
            <div key={p.id} className={"pick-card fade-in stagger-" + Math.min(i + 1, 4)}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                <div>
                  <div style={{ fontSize:11, color:"var(--text2)", fontFamily:"var(--mono)", marginBottom:4 }}>
                    {SPORTS.find(s => s.key === p.sport)?.icon} {p.type} · {formatTime(p.time)}
                  </div>
                  <div style={{ fontSize:15, fontWeight:700 }}>{p.pick}</div>
                  <div style={{ fontSize:12, color:"var(--text2)", marginTop:2 }}>{p.game}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:20, fontWeight:800, fontFamily:"var(--mono)", color: parseFloat(p.odds) > 0 ? "var(--green)" : "var(--text)" }}>{p.odds}</div>
                  <div style={{ fontSize:11, color:"var(--text2)" }}>@ {p.book}</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
                <span className="badge badge-green">Edge {p.edge}%</span>
                <span className="badge badge-mint">Conf {p.conf}%</span>
                <span className="badge badge-amber">Stake ${p.stake}</span>
              </div>
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={() => onTrack(p)} style={{ flex:1, background:"rgba(200,255,0,.08)", border:"1px solid rgba(200,255,0,.2)", borderRadius:10, padding:"8px", color:"var(--lime)", fontSize:12, fontWeight:600, fontFamily:"var(--font)", cursor:"pointer", transition:"all .2s" }}>
                  🏆 Track Pick
                </button>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── ODDS TAB ───────────────────────────────────────────────────────
    function OddsTab({ games, activeSport, setActiveSport }) {
      const sportGames = useMemo(() => games.filter(g => g.sport_key === activeSport), [games, activeSport]);
      return (
        <div className="fade-in" style={{ padding:"0 16px" }}>
          <div style={{ fontSize:22, fontWeight:700, padding:"8px 0 12px" }}>Live Odds</div>
          <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:12, WebkitOverflowScrolling:"touch" }}>
            {SPORTS.map(s => (
              <button key={s.key} onClick={() => setActiveSport(s.key)} style={{
                flexShrink:0, padding:"8px 14px", borderRadius:20, border: activeSport === s.key ? "1.5px solid var(--lime)" : "1px solid var(--border)",
                background: activeSport === s.key ? "rgba(200,255,0,.1)" : "var(--card)",
                color: activeSport === s.key ? "var(--lime)" : "var(--text2)", fontSize:12, fontWeight:600, fontFamily:"var(--font)", cursor:"pointer", whiteSpace:"nowrap",
              }}>
                {s.icon} {s.label}
              </button>
            ))}
          </div>

          {sportGames.length === 0 && (
            <div className="glass" style={{ padding:"32px 20px", textAlign:"center" }}>
              <div style={{ fontSize:13, color:"var(--text2)" }}>No games loaded for this sport. Run a scan first.</div>
            </div>
          )}

          {sportGames.map(game => {
            const h2h = [];
            for (const bk of (game.bookmakers || [])) {
              const mkt = bk.markets.find(m => m.key === "h2h");
              if (mkt) h2h.push({ book: bk.key, outcomes: mkt.outcomes });
            }
            return (
              <div key={game.id} className="pick-card" style={{ marginBottom:10 }}>
                <div style={{ fontSize:11, color:"var(--text2)", fontFamily:"var(--mono)", marginBottom:6 }}>{formatTime(game.commence_time)}</div>
                <div style={{ fontSize:14, fontWeight:700, marginBottom:10 }}>{game.away_team} @ {game.home_team}</div>
                <div style={{ display:"grid", gridTemplateColumns:"90px repeat(auto-fill, minmax(60px, 1fr))", gap:4, fontSize:11, fontFamily:"var(--mono)" }}>
                  <div style={{ color:"var(--text2)" }}>Book</div>
                  <div style={{ color:"var(--text2)" }}>{game.away_team.split(" ").pop()}</div>
                  <div style={{ color:"var(--text2)" }}>{game.home_team.split(" ").pop()}</div>
                  {h2h.map(m => {
                    const away = m.outcomes.find(o => o.name === game.away_team);
                    const home = m.outcomes.find(o => o.name === game.home_team);
                    return (
                      <React.Fragment key={m.book}>
                        <div style={{ color:"var(--text2)", fontSize:10 }}>{BOOK_NAMES[m.book] || m.book}</div>
                        <div style={{ color:"var(--green)" }}>{away ? americanOdds(away.price) : "—"}</div>
                        <div style={{ color:"var(--green)" }}>{home ? americanOdds(home.price) : "—"}</div>
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── TRACKER TAB ────────────────────────────────────────────────────
    function TrackerTab({ tracked }) {
      const wins = tracked.filter(t => t.result === "W").length;
      const losses = tracked.filter(t => t.result === "L").length;
      const pending = tracked.filter(t => !t.result).length;
      const roi = tracked.length > 0
        ? ((tracked.reduce((s, t) => s + (t.result === "W" ? (t.decOdds - 1) * parseFloat(t.stake) : t.result === "L" ? -parseFloat(t.stake) : 0), 0) / tracked.reduce((s, t) => s + parseFloat(t.stake || 0), 0) * 100) || 0).toFixed(1)
        : "0.0";

      return (
        <div className="fade-in" style={{ padding:"0 16px" }}>
          <div style={{ fontSize:22, fontWeight:700, padding:"8px 0 14px" }}>Pick Tracker</div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8, marginBottom:16 }}>
            {[
              { label:"Tracked", val:tracked.length, color:"var(--text)" },
              { label:"Wins", val:wins, color:"var(--green)" },
              { label:"Losses", val:losses, color:"var(--red)" },
              { label:"ROI", val:roi + "%", color: parseFloat(roi) >= 0 ? "var(--lime)" : "var(--red)" },
            ].map(s => (
              <div key={s.label} className="glass" style={{ padding:"12px 8px", textAlign:"center" }}>
                <div style={{ fontSize:20, fontWeight:800, fontFamily:"var(--mono)", color:s.color }}>{s.val}</div>
                <div style={{ fontSize:10, color:"var(--text2)", marginTop:2 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {tracked.length === 0 && (
            <div className="glass" style={{ padding:"32px 20px", textAlign:"center" }}>
              <SignalBars />
              <div style={{ fontSize:14, fontWeight:600, marginTop:12 }}>No picks tracked yet</div>
              <div style={{ fontSize:12, color:"var(--text2)", marginTop:4 }}>Track picks from the Picks tab to see them here</div>
            </div>
          )}

          {tracked.map((t, i) => (
            <div key={t.id + i} className="pick-card fade-in" style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:14, fontWeight:600 }}>{t.pick}</div>
                <div style={{ fontSize:11, color:"var(--text2)" }}>{t.game}</div>
                <div style={{ fontSize:11, color:"var(--text2)", fontFamily:"var(--mono)" }}>{t.odds} @ {t.book} · ${t.stake}</div>
              </div>
              <div>
                {t.result === "W" && <span className="badge badge-green">WIN</span>}
                {t.result === "L" && <span className="badge badge-red">LOSS</span>}
                {!t.result && <span className="badge badge-amber">PENDING</span>}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── AGENTS TAB ─────────────────────────────────────────────────────
    function AgentsTab({ picks, games }) {
      const staked = picks.reduce((s, p) => s + parseFloat(p.stake || 0), 0);
      const agents = [
        { name:"Data Scout", icon:"📡", desc:"Collects live odds from 6+ sportsbooks", stat: (games.length * 6) + " odds" },
        { name:"Brain", icon:"🧠", desc:"XGBoost + LogReg + Neural Net ensemble", stat: games.length + " predictions" },
        { name:"Edge Finder", icon:"⚡", desc:"Scans every bet for +EV opportunities", stat: picks.length + " +EV found" },
        { name:"Vault", icon:"🏦", desc:"Kelly sizing + tilt detection + risk limits", stat: "$" + staked.toFixed(0) + " sized" },
        { name:"Trigger", icon:"🔔", desc:"Telegram / Email / Push notifications", stat:"Alerts ready" },
        { name:"Reviewer", icon:"🔍", desc:"Calibration, CLV, drift detection", stat:"Monitoring" },
        { name:"Orchestrator", icon:"🏛️", desc:"Connects all agents into one pipeline", stat:"Pipeline OK" },
      ];

      return (
        <div className="fade-in" style={{ padding:"0 16px" }}>
          <div style={{ fontSize:22, fontWeight:700, padding:"8px 0 14px" }}>Agent Network</div>
          {agents.map((a, i) => (
            <div key={a.name} className={"pick-card fade-in stagger-" + Math.min(i + 1, 4)} style={{ display:"flex", alignItems:"center", gap:14 }}>
              <div style={{ width:44, height:44, borderRadius:12, background:"var(--card2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>
                {a.icon}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:700 }}>{a.name}</div>
                <div style={{ fontSize:11, color:"var(--text2)", marginTop:2 }}>{a.desc}</div>
              </div>
              <div style={{ fontSize:11, fontFamily:"var(--mono)", color:"var(--lime)", flexShrink:0 }}>{a.stat}</div>
            </div>
          ))}

          <div style={{ marginTop:20 }}>
            <div style={{ fontSize:15, fontWeight:700, marginBottom:10 }}>Supported Sports</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {SPORTS.map(s => (
                <span key={s.key} className="badge badge-mint">{s.icon} {s.label}</span>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── LEADERBOARD TAB ────────────────────────────────────────────────
    function LeaderboardTab() {
      const [leaders, setLeaders] = useState([]);
      const [period, setPeriod] = useState("all");
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        setLoading(true);
        fetch(BACKEND + "/api/leaderboard?period=" + period)
          .then(r => r.ok ? r.json() : { leaderboard: [] })
          .then(d => setLeaders(d.leaderboard || []))
          .catch(() => setLeaders([]))
          .finally(() => setLoading(false));
      }, [period]);

      return (
        <div className="fade-in" style={{ padding:"0 16px" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 0 6px" }}>
            <div style={{ fontSize:22, fontWeight:700 }}>Leaderboard</div>
          </div>

          <div className="toggle-row" style={{ marginBottom:14 }}>
            {[{ k:"7d", l:"7 Day" }, { k:"30d", l:"30 Day" }, { k:"all", l:"All Time" }].map(t => (
              <button key={t.k} className={"toggle-btn" + (period === t.k ? " active" : "")} onClick={() => setPeriod(t.k)}>{t.l}</button>
            ))}
          </div>

          <div className="glass" style={{ padding:"10px 14px", marginBottom:14, display:"flex", alignItems:"center", gap:8, fontSize:11, color:"var(--mint)" }}>
            <span>🔒</span>
            <span>Tamper-proof: outcomes resolved server-side via real scores, never user input.</span>
          </div>

          {loading && <div style={{ textAlign:"center", padding:20, color:"var(--text2)", fontSize:13 }}>Loading...</div>}

          {!loading && leaders.length === 0 && (
            <div className="glass" style={{ padding:"32px 20px", textAlign:"center" }}>
              <div style={{ fontSize:14, fontWeight:600 }}>No leaderboard entries yet</div>
              <div style={{ fontSize:12, color:"var(--text2)", marginTop:4 }}>Track picks to appear on the leaderboard</div>
            </div>
          )}

          {leaders.map((l, i) => (
            <div key={l.user_id || i} className="pick-card fade-in" style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:32, height:32, borderRadius:"50%", background: i === 0 ? "var(--lime)" : i === 1 ? "var(--mint)" : i === 2 ? "var(--amber)" : "var(--card2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:800, color: i < 3 ? "#0a0e1a" : "var(--text2)", flexShrink:0 }}>
                {i + 1}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:700 }}>{l.display_name || "Anon"}</div>
                <div style={{ fontSize:11, color:"var(--text2)", fontFamily:"var(--mono)" }}>{l.total_picks || 0} picks · {l.wins || 0}W-{l.losses || 0}L</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:16, fontWeight:800, fontFamily:"var(--mono)", color: (l.roi || 0) >= 0 ? "var(--lime)" : "var(--red)" }}>{(l.roi || 0).toFixed(1)}%</div>
                <div style={{ fontSize:10, color:"var(--text2)" }}>ROI</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── PLANS TAB ──────────────────────────────────────────────────────
    function PlansTab() {
      const plans = [
        { name:"Free", price:"$0", period:"/forever", features:["3 picks/day", "Basic odds view", "1 sport"], cta:"Current Plan", disabled:true },
        { name:"Premium", price:"$29", period:"/mo", features:["Unlimited picks", "All sports", "Kelly sizing", "Telegram alerts"], cta:"Upgrade", hot:true },
        { name:"VIP", price:"$79", period:"/mo", features:["Everything in Premium", "Private Discord", "1-on-1 coaching", "Early access to features"], cta:"Go VIP" },
      ];

      return (
        <div className="fade-in" style={{ padding:"0 16px" }}>
          <div style={{ fontSize:22, fontWeight:700, padding:"8px 0 4px" }}>Plans</div>
          <div style={{ fontSize:13, color:"var(--text2)", marginBottom:16 }}>Unlock the full edge-finding pipeline</div>

          {plans.map((p, i) => (
            <div key={p.name} className={"glass fade-in stagger-" + (i + 1)} style={{ padding:20, marginBottom:12, border: p.hot ? "1.5px solid var(--lime)" : "1px solid var(--border)", position:"relative" }}>
              {p.hot && (
                <div style={{ position:"absolute", top:-10, right:16, background:"var(--lime)", color:"#0a0e1a", fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:10 }}>POPULAR</div>
              )}
              <div style={{ fontSize:18, fontWeight:800 }}>{p.name}</div>
              <div style={{ display:"flex", alignItems:"baseline", gap:4, margin:"8px 0 12px" }}>
                <span style={{ fontSize:32, fontWeight:800, fontFamily:"var(--mono)" }}>{p.price}</span>
                <span style={{ fontSize:13, color:"var(--text2)" }}>{p.period}</span>
              </div>
              <div style={{ marginBottom:14 }}>
                {p.features.map(f => (
                  <div key={f} style={{ fontSize:13, color:"var(--text2)", padding:"3px 0", display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ color:"var(--lime)", fontSize:14 }}>✓</span> {f}
                  </div>
                ))}
              </div>
              <button className={p.hot ? "btn-primary" : "btn-outline"} disabled={p.disabled} style={{ width:"100%" }}>{p.cta}</button>
            </div>
          ))}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  APP ROOT
    // ═══════════════════════════════════════════════════════════════════════
    function App() {
      const [tab, setTab] = useState("picks");
      const [picks, setPicks] = useState([]);
      const [games, setGames] = useState([]);
      const [tracked, setTracked] = useState([]);
      const [scanning, setScanning] = useState(false);
      const [scanStage, setScanStage] = useState("");
      const [activeSport, setActiveSport] = useState(SPORTS[0].key);

      const scanNow = useCallback(async () => {
        setScanning(true);
        const allGames = [];
        const stages = SPORTS.map(s => s.label);

        for (let i = 0; i < SPORTS.length; i++) {
          setScanStage(`Agent 1: Scanning ${stages[i]} odds... (${i + 1}/${SPORTS.length})`);
          const data = await fetchOdds(SPORTS[i].key);
          if (data && data.length) allGames.push(...data);
          await new Promise(r => setTimeout(r, 300));
        }

        setScanStage("Agent 2: Running ensemble models...");
        await new Promise(r => setTimeout(r, 600));
        setScanStage("Agent 3: Finding edges...");
        await new Promise(r => setTimeout(r, 400));
        setScanStage("Agent 4: Sizing positions...");
        await new Promise(r => setTimeout(r, 300));

        setGames(allGames);
        const newPicks = runAgentPipeline(allGames);
        setPicks(newPicks);

        setScanStage("Agent 7: Pipeline complete ✓");
        await new Promise(r => setTimeout(r, 500));
        setScanning(false);
        setScanStage("");
      }, []);

      const handleTrack = useCallback((pick) => {
        setTracked(prev => {
          if (prev.find(t => t.id === pick.id)) return prev;
          return [...prev, { ...pick, result: null, trackedAt: new Date().toISOString() }];
        });

        // Optionally post to backend leaderboard
        if (BACKEND_API_KEY) {
          fetch(BACKEND + "/api/leaderboard/opt-in", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-Api-Key": BACKEND_API_KEY },
            body: JSON.stringify({ pick_id: pick.id }),
          }).catch(() => {});
        }
      }, []);

      const TABS = [
        { id:"picks", label:"Picks", icon:IconScan },
        { id:"odds", label:"Odds", icon:IconOdds },
        { id:"tracker", label:"Tracker", icon:IconTracker },
        { id:"agents", label:"Agents", icon:IconAgents },
        { id:"leaderboard", label:"Board", icon:IconLeaderboard },
        { id:"plans", label:"Plans", icon:IconPlans },
      ];

      return (
        <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh" }}>
          <Header />

          {tab === "picks" && (
            <PicksTab picks={picks} scanning={scanning} scanStage={scanStage} onScan={scanNow} onTrack={handleTrack} />
          )}
          {tab === "odds" && (
            <OddsTab games={games} activeSport={activeSport} setActiveSport={setActiveSport} />
          )}
          {tab === "tracker" && (
            <TrackerTab tracked={tracked} />
          )}
          {tab === "agents" && (
            <AgentsTab picks={picks} games={games} />
          )}
          {tab === "leaderboard" && (
            <LeaderboardTab />
          )}
          {tab === "plans" && (
            <PlansTab />
          )}

          <nav className="bottom-nav">
            {TABS.map(t => (
              <button key={t.id} className={"nav-btn" + (tab === t.id ? " active" : "")} onClick={() => setTab(t.id)}>
                <t.icon style={{ width:22, height:22 }} />
                {t.label}
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // ─── MOUNT ──────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
