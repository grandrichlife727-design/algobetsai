        script.textContent = transformed;
        document.body.appendChild(script);
      } catch(e) {
        document.getElementById('root').innerHTML = '<div style="color:red;padding:20px">Error: ' + e.message + '</div>';
        console.error(e);
      }
    }
    
    var babelScript = document.createElement('script');
    babelScript.src = 'https://unpkg.com/@babel/standalone@7.23.6/babel.min.js';
    babelScript.onload = runApp;
    babelScript.onerror = function() { 
      document.getElementById('root').innerHTML = '<div style="color:red;padding:20px">Failed to load Babel</div>';

    const isPro = () => {

        return localStorage.getItem("algobets_plan") === "pro" || localStorage.getItem("algobets_plan") === "sharp";

    const fetchPlanStatus = async (userId) => {
      try {
        const res = await fetch(`${BACKEND}/api/plan-status`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId: userId || getUserEmail() }),
        });
        if (!res.ok) throw new Error(`Backend error: ${res.status}`);
        const data = await res.json();
        return { plan: data.plan || "free", isActive: data.isActive || false, expiresAt: data.expiresAt };
      } catch (err) {
        console.warn("Failed to fetch plan status:", err);
        // Fallback to localStorage during network issues
        const localPlan = localStorage.getItem("algobets_plan") || "free";
        return { plan: localPlan, isActive: localPlan !== "free", expiresAt: null };
      }
    };

    // Check and update user plan (call this on app init and periodically)
    const checkUserPlan = async (userId, onPlanUpdate) => {
      const status = await fetchPlanStatus(userId);
      const currentPlan = localStorage.getItem("algobets_plan") || "free";
      
      if (status.plan !== currentPlan) {
        // Plan has changed - update localStorage
        if (status.plan === "free") {
          localStorage.removeItem("algobets_plan");
        } else {
          localStorage.setItem("algobets_plan", status.plan);
        }
        // Notify caller of plan change
        if (onPlanUpdate) onPlanUpdate(status.plan);
      }
      
      return status;
    };

    // ─── PARLAY TAB ───────────────────────────────────────────────────────────────
    function ParlayTab({ parlay, onRemove, onClear, userPlan, onPaywall }) {
      const [stake, setStake] = useState(50);
      const [customStake, setCustomStake] = useState("");

      const activeStake = customStake ? parseFloat(customStake) || 0 : stake;

      if (parlay.length === 0) return (
        <div style={{ padding: "20px 16px 100px", textAlign: "center" }}>
          <div style={{ padding: "80px 20px", color: "#4b5563" }}>
            <div style={{ fontSize: 52 }}>⚡</div>
            <p style={{ marginTop: 16, fontSize: 16, fontWeight: 700, color: "#6b7280" }}>Parlay Builder</p>
            <p style={{ fontSize: 13, marginTop: 6 }}>Add picks from the Picks tab to build your parlay</p>
          </div>
        </div>
      );

      const calcParlay = () => {
        return parlay.reduce((acc, p) => {
          const oddsStr = p.odds || "-110";
          const raw = parseInt(oddsStr.replace("+", "")) || 110;
          const dec = oddsStr.startsWith("+") ? raw / 100 + 1 : 100 / Math.abs(raw) + 1;
          return acc * (isFinite(dec) ? dec : 1.909);
        }, 1);
      };

      const parlayOdds = calcParlay();
      const payout = (parlayOdds * activeStake).toFixed(2);
      const profit = (payout - activeStake).toFixed(2);
      const impliedProb = (1 / parlayOdds * 100).toFixed(1);
      const avgEdge = (parlay.reduce((a, p) => a + (p.edge || 0), 0) / parlay.length).toFixed(1);
      const americanOdds = parlayOdds >= 2 ? `+${Math.round((parlayOdds - 1) * 100)}` : `-${Math.round(100 / (parlayOdds - 1))}`;

      const bestAffiliate = AFFILIATES[parlay[0]?.affiliateBoost] || AFFILIATES.draftkings;

      return (
        <div style={{ padding: "20px 16px 100px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>Parlay Builder</h2>
              <p style={{ fontSize: 12, color: "#6b7280" }}>{parlay.length} leg{parlay.length !== 1 ? "s" : ""} • {americanOdds} parlay odds</p>
            </div>
            <button onClick={onClear} style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 10, padding: "8px 14px", color: "#f87171", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Clear</button>

          {/* Legs */}
          {parlay.map((pick, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "12px 14px", marginBottom: 8 }}>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 11, color: "#6b7280" }}>{pick.game}</p>
                <p style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>{pick.bet}</p>
                <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                  <Pill color={eColor(pick.edge)}>{pick.edge?.toFixed(1)}% edge</Pill>
                  <Pill color={cColor(pick.confidence)}>{pick.confidence}% conf</Pill>
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: pick.odds?.startsWith("+") ? "#4ade80" : "#f87171", fontFamily: "monospace" }}>{pick.odds}</div>
              </div>
              <button onClick={() => onRemove(pick.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#6b7280", padding: 4 }}>
                <SVG d={I.x} size={16} />
              </button>
            </div>
          ))}

          {/* Stats grid */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, margin: "18px 0" }}>
            {[["Parlay Odds", americanOdds, "#22d3ee"], ["Implied %", `${impliedProb}%`, "#a78bfa"], ["Avg Edge", `${avgEdge}%`, "#4ade80"]].map(([l, v, c]) => (
              <div key={l} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "12px 8px", textAlign: "center" }}>
                <p style={{ fontSize: 10, color: "#6b7280", marginBottom: 4 }}>{l}</p>
                <p style={{ fontSize: 16, fontWeight: 900, color: c }}>{v}</p>
              </div>
            ))}
          </div>

          {/* Stake */}
          <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: 14, padding: "16px", marginBottom: 14 }}>
            <p style={{ fontSize: 12, color: "#9ca3af", marginBottom: 10, fontWeight: 600 }}>Stake</p>
            <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
              {[10, 25, 50, 100].map(v => (
                <button key={v} onClick={() => { setStake(v); setCustomStake(""); }}
                  style={{ flex: 1, padding: "9px 0", borderRadius: 10, background: activeStake === v && !customStake ? "linear-gradient(135deg,#0891b2,#7c3aed)" : "rgba(255,255,255,0.06)", border: activeStake === v && !customStake ? "none" : "1px solid rgba(255,255,255,0.09)", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>${v}</button>
              ))}
            </div>
            <input type="number" value={customStake} onChange={e => setCustomStake(e.target.value)} placeholder="Custom amount..."
              style={{ width: "100%", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 14px", color: "#fff", fontSize: 14, fontFamily: "monospace" }} />

          <div style={{ background: "linear-gradient(135deg,rgba(8,145,178,0.1),rgba(124,58,237,0.1))", border: "1px solid rgba(34,211,238,0.2)", borderRadius: 16, padding: "20px", marginBottom: 14, textAlign: "center" }}>

          </div>

          {/* Place parlay via affiliate */}
          <a href={bestAffiliate.url} target="_blank" rel="noopener noreferrer" onClick={() => trackAffClick(parlay[0]?.affiliateBoost || "draftkings")}

            🎯 Place on {bestAffiliate.name} →
          </a>

          <div style={{ display: "flex", gap: 8 }}>
            {Object.entries(AFFILIATES).map(([key, aff]) => (
              <a key={key} href={aff.url} target="_blank" rel="noopener noreferrer" onClick={() => trackAffClick(key)}
                style={{ flex: 1, padding: "10px", background: `${aff.color}15`, border: `1px solid ${aff.color}30`, borderRadius: 12, textAlign: "center", textDecoration: "none" }}>
                <p style={{ fontSize: 12, fontWeight: 800, color: aff.color }}>{aff.logo}</p>
              </a>
            ))}
          </div>
        </div>
      );
    }

    // ─── TRACKER TAB ──────────────────────────────────────────────────────────────
    function TrackerTab() {
      const [bets, setBets] = useState(() => { try { return JSON.parse(localStorage.getItem("algobets_bets") || "[]"); } catch { return []; } });
      const [adding, setAdding] = useState(false);
      const [filter, setFilter] = useState("All");
      const [form, setForm] = useState({ game: "", bet: "", odds: "", stake: "", outcome: "pending", betType: "straight" });
      const [propPlayer, setPropPlayer] = useState("");
      const [propType, setPropType] = useState("Points");
      const [propLine, setPropLine] = useState("");
      const [propDir, setPropDir] = useState("over");

      const save = (b) => { setBets(b); localStorage.setItem("algobets_bets", JSON.stringify(b)); };

      const exportCSV = () => {
        if (bets.length === 0) { showToast("No bets to export yet", "info"); return; }
        const header = "Date,Game,Bet,Odds,Stake ($),Outcome,P&L ($)";
        const rows = bets.map(b => {
          const ret = betReturn(b);
          return `"${b.date}","${b.game}","${b.bet}","${b.odds}","${b.stake}","${b.outcome}","${ret >= 0 ? "+" : ""}${ret.toFixed(2)}"`;
        });
        const csv = [header, ...rows].join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `edgebet-bets-${new Date().toISOString().split("T")[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("✅ CSV downloaded!", "success");
      };

      const add = () => {
        const builtBet = form.betType === "prop"
          ? `${propPlayer} ${propDir === "over" ? "Over" : "Under"} ${propLine} ${propType}`
          : form.bet;
        if (!form.game || !builtBet.trim()) return;
        save([{ ...form, bet: builtBet, id: Date.now(), date: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" }) }, ...bets]);
        setForm({ game: "", bet: "", odds: "", stake: "", outcome: "pending", betType: "straight" });
        setPropPlayer(""); setPropLine(""); setPropType("Points"); setPropDir("over");
        setAdding(false);
      };
      const remove = (id) => save(bets.filter(b => b.id !== id));
      const cycle = (id) => save(bets.map(b => b.id === id ? { ...b, outcome: b.outcome === "pending" ? "win" : b.outcome === "win" ? "loss" : "pending" } : b));

      const betReturn = (b) => {
        const s = parseFloat(b.stake) || 0;
        const raw = parseInt(b.odds?.replace("+", "") || "110");
        if (b.outcome === "win") return s * (b.odds?.startsWith("+") ? raw / 100 : 100 / Math.abs(raw));
        if (b.outcome === "loss") return -s;
        return 0;
      };

      const settled   = bets.filter(b => b.outcome !== "pending");
      const wins      = bets.filter(b => b.outcome === "win").length;
      const losses    = bets.filter(b => b.outcome === "loss").length;
      const pnl       = bets.reduce((a, b) => a + betReturn(b), 0);
      const staked    = settled.reduce((a, b) => a + (parseFloat(b.stake) || 0), 0);
      const roi       = staked > 0 ? ((pnl / staked) * 100).toFixed(1) : "0.0";
      const winRate   = settled.length > 0 ? Math.round(wins / settled.length * 100) : 0;

      // Running P&L sparkline — last 10 settled bets
      const sparkBets = [...settled].reverse().slice(0, 10);
      const running   = sparkBets.reduce((acc, b) => { const last = acc.length ? acc[acc.length - 1] : 0; return [...acc, last + betReturn(b)]; }, []);
      const maxAbs    = Math.max(...running.map(Math.abs), 1);

      const OS = (o) => ({
        win:     { color: "#4ade80", bg: "rgba(74,222,128,0.12)",   border: "rgba(74,222,128,0.2)" },
        loss:    { color: "#f87171", bg: "rgba(248,113,113,0.12)",  border: "rgba(248,113,113,0.2)" },
        pending: { color: "#fbbf24", bg: "rgba(251,191,36,0.12)",   border: "rgba(251,191,36,0.2)" },
      }[o] || {});

      const filteredBets = filter === "All" ? bets
        : filter === "Won" ? bets.filter(b => b.outcome === "win")
        : filter === "Lost" ? bets.filter(b => b.outcome === "loss")
        : bets.filter(b => b.outcome === "pending");

      return (
        <div style={{ padding: "20px 16px 100px" }}>

          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>Bet Tracker</h2>
              <p style={{ fontSize: 12, color: "#6b7280" }}>{bets.length} bet{bets.length !== 1 ? "s" : ""} logged</p>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              {bets.length > 0 && (
                <button onClick={exportCSV} style={{ background: "rgba(34,211,238,0.1)", border: "1px solid rgba(34,211,238,0.25)", borderRadius: 10, padding: "8px 12px", color: "#22d3ee", fontSize: 12, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                  ↓ CSV
                </button>
              )}
              <button onClick={() => setAdding(x => !x)} style={{ background: "linear-gradient(135deg,#0891b2,#7c3aed)", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                <SVG d={I.plus} size={14} /> Add Bet
              </button>
            </div>
          </div>

          {/* Stats grid — 6 cells, 3 per row */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 16 }}>
            {[
              ["Wins",   wins,                                         "#4ade80"],
              ["Losses", losses,                                        "#f87171"],
              ["Win %",  `${winRate}%`,                                 "#a78bfa"],
              ["ROI",    `${parseFloat(roi) >= 0 ? "+" : ""}${roi}%`,  parseFloat(roi) >= 0 ? "#4ade80" : "#f87171"],
              ["P&L",    `${pnl >= 0 ? "+" : ""}$${Math.abs(pnl).toFixed(0)}`, pnl >= 0 ? "#22d3ee" : "#f87171"],
              ["Staked", `$${staked.toFixed(0)}`,                      "#6b7280"],
            ].map(([l, v, c]) => (
              <div key={l} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "12px 8px", textAlign: "center" }}>
                <p style={{ fontSize: 10, color: "#6b7280", marginBottom: 3 }}>{l}</p>
                <p style={{ fontSize: 15, fontWeight: 900, color: c }}>{v}</p>
              </div>
            ))}
          </div>

          {/* P&L Sparkline */}
          {running.length >= 3 && (
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: "14px 16px", marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                <p style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>P&L Trend · Last {running.length} bets</p>
                <p style={{ fontSize: 11, fontWeight: 800, color: pnl >= 0 ? "#4ade80" : "#f87171" }}>{pnl >= 0 ? "+" : ""}${pnl.toFixed(0)}</p>
              </div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 44 }}>
                {running.map((val, i) => {
                  const h = Math.max(4, (Math.abs(val) / maxAbs) * 44);
                  return (
                    <div key={i} style={{ flex: 1, height: h, background: val >= 0 ? "linear-gradient(180deg,#4ade80,#22d3ee80)" : "linear-gradient(180deg,#f87171,#ef444480)", borderRadius: "3px 3px 0 0", opacity: 0.85, alignSelf: "flex-end" }} />
                  );
                })}
              </div>
            </div>
          )}

          {/* Outcome filter with counts */}
          <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
            {[
              { label: "All",     count: bets.length },
              { label: "Pending", count: bets.filter(b => b.outcome === "pending").length },
              { label: "Won",     count: bets.filter(b => b.outcome === "win").length },

                    <p style={{ fontSize: 11, color: "#6b7280", marginBottom: 4 }}>Player Name</p>

                      style={{ width: "100%", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14 }} />
                  </div>
                  <div style={{ marginBottom: 10 }}>
                    <p style={{ fontSize: 11, color: "#6b7280", marginBottom: 4 }}>Prop Type</p>
                    <select value={propType} onChange={e => setPropType(e.target.value)}
                      style={{ width: "100%", background: "rgba(0,0,0,0.5)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14 }}>
                      {["Points","Rebounds","Assists","3-Pointers","Steals","Blocks","Pass Yards","Rush Yards","Rec Yards","Receptions"].map(t => <option key={t} style={{ background: "#111" }}>{t}</option>)}
                    </select>
                  </div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                    <div style={{ flex: 2 }}>
                      <p style={{ fontSize: 11, color: "#6b7280", marginBottom: 4 }}>Line</p>
                      <input value={propLine} onChange={e => setPropLine(e.target.value)} placeholder="e.g. 24.5"
                        style={{ width: "100%", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14 }} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <p style={{ fontSize: 11, color: "#6b7280", marginBottom: 4 }}>Direction</p>
                      <button onClick={() => setPropDir(d => d === "over" ? "under" : "over")}
                        style={{ width: "100%", background: propDir === "over" ? "rgba(74,222,128,0.15)" : "rgba(248,113,113,0.15)", border: `1px solid ${propDir === "over" ? "#4ade8040" : "#f8717140"}`, borderRadius: 10, padding: "10px", color: propDir === "over" ? "#4ade80" : "#f87171", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                        {propDir === "over" ? "Over ↑" : "Under ↓"}
                      </button>
                    </div>
                  </div>
                </>

                <div style={{ marginBottom: 10 }}>
                  <p style={{ fontSize: 11, color: "#6b7280", marginBottom: 4 }}>Your Bet</p>
                  <input value={form.bet} onChange={e => setForm(f => ({ ...f, bet: e.target.value }))} placeholder="e.g. Lakers -4.5"
                    style={{ width: "100%", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14 }} />
                </div>
              )}
              {/* Odds + Stake — always shown */}
              {[["Odds", "odds", "e.g. -110 or +150"], ["Stake ($)", "stake", "e.g. 50"]].map(([label, key, ph]) => (
                <div key={key} style={{ marginBottom: 10 }}>
                  <p style={{ fontSize: 11, color: "#6b7280", marginBottom: 4 }}>{label}</p>
                  <input value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} placeholder={ph}
                    style={{ width: "100%", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14 }} />
                </div>

              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={add} style={{ flex: 1, padding: "11px", background: "linear-gradient(135deg,#0891b2,#7c3aed)", border: "none", borderRadius: 10, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Add Bet</button>
                <button onClick={() => setAdding(false)} style={{ flex: 1, padding: "11px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: 10, color: "#9ca3af", fontWeight: 700, cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          )}

          {filteredBets.length === 0 && !adding && (
            <div style={{ textAlign: "center", padding: "60px 20px" }}>
              <div style={{ fontSize: 48 }}>
                {filter === "All" ? "📊" : filter === "Won" ? "🏆" : filter === "Lost" ? "📉" : "⏳"}
              </div>
              <p style={{ marginTop: 16, fontSize: 15, fontWeight: 700, color: "#6b7280" }}>
                {filter === "All" ? "No bets tracked yet" : filter === "Won" ? "No wins logged yet" : filter === "Lost" ? "No losses logged yet" : "No pending bets"}
              </p>
              <p style={{ fontSize: 13, marginTop: 6, color: "#4b5563" }}>
                {filter === "All" ? "Tap 'Add Bet' to start tracking your ROI" : filter === "Pending" ? "All your bets have been settled" : "Tap a bet's outcome badge to mark wins & losses"}
              </p>
            </div>
          )}

          {filteredBets.map(bet => {
            const os = OS(bet.outcome);
            const ret = betReturn(bet);
            return (
              <div key={bet.id} style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${os.border || "rgba(255,255,255,0.08)"}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>

                        {bet.outcome.toUpperCase()}
                      </button>
                    </div>
                    <p style={{ fontSize: 12, color: "#9ca3af" }}>{bet.game}</p>
                    <p style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>
                      {bet.bet}
                      {bet.betType === "prop" && (
                        <span style={{ marginLeft: 6, fontSize: 9, fontWeight: 800, background: "#6366f118", border: "1px solid #6366f140", borderRadius: 4, padding: "2px 6px", color: "#a5b4fc", verticalAlign: "middle" }}>PROP</span>
                      )}
                    </p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <button onClick={() => remove(bet.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#4b5563", marginBottom: 6, display: "block", marginLeft: "auto" }}><SVG d={I.x} size={14} /></button>
                    <div style={{ fontSize: 14, fontWeight: 800, color: bet.odds?.startsWith("+") ? "#4ade80" : "#f87171", fontFamily: "monospace" }}>{bet.odds}</div>
                    <div style={{ fontSize: 12, color: "#6b7280" }}>${bet.stake}</div>
                    {bet.outcome !== "pending" && (
                      <div style={{ fontSize: 13, fontWeight: 900, color: ret >= 0 ? "#4ade80" : "#f87171", marginTop: 4, fontFamily: "monospace" }}>
                        {ret >= 0 ? "+" : ""}${Math.abs(ret).toFixed(0)}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── CHAT TAB ─────────────────────────────────────────────────────────────────
    function ChatTab({ onBack }) {
      const now = () => new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
      const [messages, setMessages] = useState([
        { role: "assistant", text: "Hey! 👋 I'm your Algobets Ai — ask me about picks, line movement, Kelly sizing, bankroll strategy, or anything betting-related.", time: now() }
      ]);
      const [input, setInput] = useState("");
      const [chatLoading, setChatLoading] = useState(false);
      const ref = useRef(null);

      useEffect(() => { ref.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

      const SMART_REPLIES = [
        "Today's sharpest play: look for games with reverse line movement — when 65%+ public is on one side but the line moves the other way, that's sharp money talking.",
        "Kelly criterion example: 75% confidence at -110 odds → edge = 0.75 - (100/210) = 27.4%. Full Kelly = 27.4%, but most pros use ¼ Kelly (6.9% of bankroll) to protect variance.",
        "Line shopping is one of the highest-ROI habits. Getting +3.5 instead of +3 on a spread is worth ~1.8% extra edge over thousands of bets. Always check 2-3 books before placing.",
        "Injury tip: a star player listed as 'Questionable' typically moves a spread 1-2 points and can swing a total 3-4 points if they're the team's leading scorer or top defender.",
        "Parlay math: a 3-leg parlay at -110/-110/-110 pays roughly +595. The true fair odds would be +565 — so you're giving the book ~$30 per $100 in implied edge. Single bets give better EV.",
        "Steam move: when a sharp syndicate hits the same number at 5-6 books simultaneously, lines move fast. The opening line shift is usually where the real edge lives — act quickly.",
        "Bankroll strategy: the 1-3% flat-bet rule is most sustainable. On a $500 bankroll, bet $5-15 per game. Scale up only after 100+ bets of proven +ROI.",
        "For NBA player props, L5 hit rate above 70% + edge above 5% is a solid threshold. Always cross-check against tonight's matchup — some defenders suppress specific stats hard.",
      ];

      const sendMessage = async (text) => {
        const trimmed = (text || input).trim();
        if (!trimmed || chatLoading) return;
        setInput("");
        const userMsg = { role: "user", text: trimmed, time: now() };
        setMessages(m => [...m, userMsg]);
        setChatLoading(true);
        try {
          const res = await fetch(`${BACKEND}/chat`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: trimmed }) });
          const data = await res.json();
          const reply = data.reply || data.message || SMART_REPLIES[Math.floor(Math.random() * SMART_REPLIES.length)];
          setMessages(m => [...m, { role: "assistant", text: reply, time: now() }]);
        } catch {
          setMessages(m => [...m, { role: "assistant", text: SMART_REPLIES[Math.floor(Math.random() * SMART_REPLIES.length)], time: now() }]);
        } finally { setChatLoading(false); }
      };

      const SUGGESTIONS = [
        { label: "🔥 Best bet today?", q: "What's the best bet today based on sharp action?" },
        { label: "📐 Kelly sizing",     q: "Explain Kelly criterion and how to size my bets" },
        { label: "📈 Read line moves",  q: "How do I read line movement and what does RLM mean?" },
        { label: "💰 Parlay vs single", q: "Should I bet parlays or single games? What gives better value?" },
      ];

      const chatHeight = onBack ? "calc(100dvh - 130px)" : "calc(100dvh - 130px)";

      return (
        <div style={{ display: "flex", flexDirection: "column", height: chatHeight }}>
          {/* Header */}
          <div style={{ padding: "16px 16px 10px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 10 }}>
            {onBack && (
              <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#6b7280", padding: "2px 0", flexShrink: 0 }}>
                <SVG d="M15 19l-7-7 7-7" size={20} />
              </button>
            )}
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <h2 style={{ fontSize: 20, fontWeight: 900, color: "#fff" }}>AI Assistant</h2>
                <PulseDot color="#4ade80" />
              </div>
              <p style={{ fontSize: 12, color: "#6b7280" }}>Strategy, analysis & bankroll advice</p>
              <p style={{ fontSize: 10, color: "#4b5563", marginTop: 2 }}>General educational info only — not personalized betting or financial advice.</p>
            </div>
            {messages.length > 1 && (
              <button onClick={() => setMessages([{ role: "assistant", text: "Hey! 👋 I'm your Algobets Ai — ask me about picks, line movement, Kelly sizing, bankroll strategy, or anything betting-related.", time: now() }])}
                style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "5px 10px", color: "#6b7280", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                Clear
              </button>
            )}
          </div>

          {/* Messages */}
          <div style={{ flex: 1, overflowY: "auto", padding: "16px", display: "flex", flexDirection: "column", gap: 14 }}>
            {messages.map((m, i) => (
              <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: m.role === "user" ? "flex-end" : "flex-start", animation: "fadein 0.2s ease" }}>
                <div style={{ maxWidth: "84%", background: m.role === "user" ? "linear-gradient(135deg,#0891b2,#7c3aed)" : "rgba(255,255,255,0.06)", border: m.role === "assistant" ? "1px solid rgba(255,255,255,0.09)" : "none", borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px", padding: "12px 16px", fontSize: 14, color: "#e5e7eb", lineHeight: 1.65 }}>
                  {m.text}
                </div>
                {m.time && <p style={{ fontSize: 10, color: "#4b5563", marginTop: 4, paddingLeft: 4, paddingRight: 4 }}>{m.time}</p>}
              </div>
            ))}
            {chatLoading && (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start" }}>
                <div style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "18px 18px 18px 4px", padding: "14px 18px", display: "flex", gap: 5 }}>
                  {[0, 1, 2].map(i => <span key={i} style={{ width: 7, height: 7, borderRadius: "50%", background: "#22d3ee", display: "inline-block", animation: `bounce 1.2s ${i * 0.2}s ease-in-out infinite`, opacity: 0.7 }} />)}
                </div>
              </div>
            )}
            <div ref={ref} />
          </div>

          {/* Suggestion chips */}
          <div style={{ padding: "8px 16px 4px", display: "flex", gap: 8, overflowX: "auto", scrollbarWidth: "none" }}>
            {SUGGESTIONS.map(s => (
              <button key={s.label} onClick={() => sendMessage(s.q)}
                style={{ padding: "6px 13px", borderRadius: 99, background: "rgba(34,211,238,0.07)", border: "1px solid rgba(34,211,238,0.18)", color: "#22d3ee", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
                {s.label}
              </button>
            ))}
          </div>

          {/* Input bar */}
          <div style={{ padding: "10px 16px 16px", borderTop: "1px solid rgba(255,255,255,0.07)", display: "flex", gap: 10 }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendMessage()}
              placeholder="Ask about picks, strategy, odds..."
              style={{ flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: "12px 16px", color: "#fff", fontSize: 14, outline: "none" }} />
            <button onClick={() => sendMessage()} disabled={chatLoading} style={{ background: "linear-gradient(135deg,#0891b2,#7c3aed)", border: "none", borderRadius: 12, width: 46, height: 46, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", opacity: chatLoading ? 0.6 : 1 }}>
              <SVG d={I.send} size={18} color="#fff" />
            </button>
          </div>
        </div>
      );
    }

    // ─── LINE MOVEMENT SCREEN ─────────────────────────────────────────────────────
    function LineMovementScreen({ onBack }) {
      const [filter, setFilter] = useState("All");
      const [lines, setLines] = useState(DEMO_LINES);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        const fetchLines = async () => {
          setLoading(true);
          try {
            const res = await fetch(`${BACKEND}/api/line-movement`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data.results?.length) setLines(data.results);
          } catch {
            // keep DEMO_LINES
          } finally {
            setLoading(false);
          }
        };
        fetchLines();
      }, []);

      const sports = ["All", ...new Set(lines.map(l => l.sport))];
      const sortedLines = [...lines].sort((a, b) => {
        const scoreA = (a.steam ? 4 : 0) + (a.reverseLineMove ? 2 : 0) + (a.sharpPct / 100);
        const scoreB = (b.steam ? 4 : 0) + (b.reverseLineMove ? 2 : 0) + (b.sharpPct / 100);
        return scoreB - scoreA;
      });
      const filtered = filter === "All" ? sortedLines : sortedLines.filter(l => l.sport === filter);

      return (
        <div style={{ padding: onBack ? "0 0 100px" : "20px 0 100px" }}>
          <div style={{ padding: "0 16px 12px", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>

                <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#6b7280", padding: "2px 0" }}>
                  <SVG d="M15 19l-7-7 7-7" size={20} />
                </button>

    // ─── BANKROLL CALCULATOR SCREEN ───────────────────────────────────────────────
    function BankrollCalcScreen({ onBack }) {
      const load = (k, d) => { try { return localStorage.getItem(k) || d; } catch { return d; } };
      const [bankroll, setBankroll] = useState(() => load("algobets_calc_bankroll", "1000"));
      const [confidence, setConfidence] = useState(() => load("algobets_calc_conf", "70"));
      const [odds, setOdds] = useState(() => load("algobets_calc_odds", "-110"));
      useEffect(() => { try { localStorage.setItem("algobets_calc_bankroll", bankroll); } catch {} }, [bankroll]);
      useEffect(() => { try { localStorage.setItem("algobets_calc_conf", confidence); } catch {} }, [confidence]);
      useEffect(() => { try { localStorage.setItem("algobets_calc_odds", odds); } catch {} }, [odds]);

      const calc = () => {
        const B = parseFloat(bankroll) || 0;
        const p = (parseFloat(confidence) || 50) / 100;
        const q = 1 - p;
        const rawOdds = parseInt(odds) || -110;
        const decOdds = rawOdds > 0 ? rawOdds / 100 : 100 / Math.abs(rawOdds);
        const kelly = Math.max(0, (decOdds * p - q) / decOdds);
        const impliedP = rawOdds > 0 ? 100 / (rawOdds + 100) : Math.abs(rawOdds) / (Math.abs(rawOdds) + 100);
        const ev = ((p * decOdds - 1) * 100).toFixed(1);
        return {
          full:    (kelly * 100).toFixed(1),
          half:    (kelly * 50).toFixed(1),
          quarter: (kelly * 25).toFixed(1),
          fullAmt:    (kelly * B).toFixed(2),
          halfAmt:    (kelly * B * 0.5).toFixed(2),
          quarterAmt: (kelly * B * 0.25).toFixed(2),
          impliedP:   (impliedP * 100).toFixed(1),
          ev, edgeExists: parseFloat(ev) > 0,
        };
      };

      const r = calc();

      return (
        <div style={{ padding: "0 0 100px" }}>
          <div style={{ padding: "16px 16px 14px", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 2 }}>
              <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#6b7280" }}>
                <SVG d="M15 19l-7-7 7-7" size={20} />
              </button>
              <h2 style={{ fontSize: 20, fontWeight: 900, color: "#fff" }}>Bankroll Calculator</h2>
            </div>
            <p style={{ fontSize: 12, color: "#6b7280", marginLeft: 30 }}>Kelly Criterion & Expected Value</p>
          </div>

          <div style={{ padding: 16 }}>
            {/* Inputs */}
            {[
              { label: "Bankroll ($)", val: bankroll, set: setBankroll, ph: "e.g. 1000", type: "number" },
              { label: "Your Confidence (%)", val: confidence, set: setConfidence, ph: "e.g. 70", type: "number" },
              { label: "Odds (American)", val: odds, set: setOdds, ph: "e.g. -110 or +150", type: "text" },
            ].map(({ label, val, set, ph, type }) => (
              <div key={label} style={{ marginBottom: 14 }}>
                <p style={{ fontSize: 12, color: "#9ca3af", fontWeight: 600, marginBottom: 6 }}>{label}</p>
                <input type={type} value={val} onChange={e => set(e.target.value)} placeholder={ph}
                  style={{ width: "100%", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 12, padding: "12px 14px", color: "#fff", fontSize: 15, fontFamily: "monospace" }} />
              </div>
            ))}

            {/* EV Badge */}
            <div style={{ background: r.edgeExists ? "rgba(34,211,238,0.08)" : "rgba(248,113,113,0.08)", border: `1px solid ${r.edgeExists ? "rgba(34,211,238,0.25)" : "rgba(248,113,113,0.25)"}`, borderRadius: 14, padding: "14px 16px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <p style={{ fontSize: 11, color: "#6b7280", marginBottom: 2 }}>Expected Value</p>
                <p style={{ fontSize: 24, fontWeight: 900, color: r.edgeExists ? "#22d3ee" : "#f87171" }}>{r.ev > 0 ? "+" : ""}{r.ev}%</p>
              </div>
              <div style={{ textAlign: "right" }}>
                <p style={{ fontSize: 11, color: "#6b7280", marginBottom: 2 }}>Book's Implied Prob</p>
                <p style={{ fontSize: 16, fontWeight: 800, color: "#9ca3af" }}>{r.impliedP}%</p>
              </div>
            </div>

            {/* Kelly sizing */}
            <p style={{ fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10 }}>Kelly Bet Sizing</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
              {[
                { label: "Full Kelly", pct: r.full, amt: r.fullAmt, color: "#f87171", note: "Aggressive — high variance" },
                { label: "½ Kelly", pct: r.half, amt: r.halfAmt, color: "#fb923c", note: "Moderate — balanced risk" },
                { label: "¼ Kelly", pct: r.quarter, amt: r.quarterAmt, color: "#4ade80", note: "Recommended — pro standard" },
              ].map(({ label, pct, amt, color, note }) => (
                <div key={label} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <p style={{ fontSize: 14, fontWeight: 800, color: "#fff" }}>{label}</p>
                    <p style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>{note}</p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontSize: 20, fontWeight: 900, color, fontFamily: "monospace" }}>${amt}</p>

                  </div>
                </div>
              ))}
            </div>

            {/* Pro tip */}
            <div style={{ background: "linear-gradient(135deg,rgba(8,145,178,0.08),rgba(124,58,237,0.08))", border: "1px solid rgba(167,139,250,0.2)", borderRadius: 14, padding: "14px 16px" }}>
              <p style={{ fontSize: 12, fontWeight: 800, color: "#a78bfa", marginBottom: 4 }}>💡 Pro Standard</p>
              <p style={{ fontSize: 12, color: "#9ca3af", lineHeight: 1.6 }}>Most sharp bettors use ¼ Kelly to protect against model error and reduce variance. At full Kelly you'll experience brutal drawdowns even with a real edge. Start conservative — you can always scale up once the edge is proven over 300+ bets.</p>
            </div>
          </div>
        </div>
      );
    }

    function InjuryFeedScreen({ onBack }) {
      const [injuries, setInjuries] = useState(DEMO_INJURIES);
      const [sport, setSport] = useState("All");
      const [lastUpdated, setLastUpdated] = useState(null);
      const [isLive, setIsLive] = useState(false);
      const sports = ["All", "NBA", "NFL", "NHL", "WNBA"];

      useEffect(() => {
        const poll = async () => {
          try {
            const res = await fetch(`${BACKEND}/api/injuries`);
            const json = await res.json();
            if (json.injuries) { setInjuries(json.injuries); setIsLive(true); }
            setLastUpdated(new Date());
          } catch {
            setLastUpdated(new Date());
            setIsLive(false);
          }
        };
        poll();
        const t = setInterval(poll, 30000);
        return () => clearInterval(t);
      }, []);

      const filtered = sport === "All" ? injuries : injuries.filter(i => i.sport === sport);
      const statusColor = (s) => s === "Out" ? "#f87171" : s === "Questionable" ? "#fb923c" : "#4ade80";

            </div>
          </div>

          <div style={{ margin: "14px 16px 0", background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.2)", borderRadius: 10, padding: "8px 12px", display: "flex", gap: 8, alignItems: "center" }}>

            <div style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 48, background: "linear-gradient(to right, transparent, #09090b)", pointerEvents: "none" }} />

          <div style={{ padding: "0 16px" }}>

              return (
                <div key={item.id} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: "14px 16px", marginBottom: 12 }}>

    // ── Phone flow ────────────────────────────────────────────────────────────────

      const sendCode = async () => {
        if (!/^\+?[\d\s\-()]{7,15}$/.test(phone.replace(/\s/g, ""))) { setError("Enter a valid phone number"); return; }
        setLoading(true); await new Promise(r => setTimeout(r, 900)); setLoading(false);
        setError(""); setPhase("code");
        // In production: call Twilio/Firebase Auth here
        // OTP sent (server-side in production)
      };

      const verifyCode = async () => {
        if (code.length !== 6) { setError("Enter the 6-digit code"); return; }
        setLoading(true); await new Promise(r => setTimeout(r, 700));
        if (code !== sentCode) { setError("Incorrect code — check console for demo code"); setLoading(false); return; }
        const users = JSON.parse(localStorage.getItem("algobets_users") || "[]");
        let user = users.find(u => u.phone === phone);
        if (!user) {
          user = { username: `User${phone.slice(-4)}`, phone, plan: "free", joinedAt: new Date().toISOString(), authMethod: "phone" };

    // ── Email OTP flow — matches Outlier.bet exactly (no passwords, just magic code)
    function EmailFlow({ onDone, onBack }) {
      const [phase, setPhase] = useState("email"); // email | code | username
      const [email, setEmail] = useState(PREFILLED_EMAIL);
      const [code, setCode] = useState("");
      const [username, setUsername] = useState("");
      const [favSport, setFavSport] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);
      const [isNewUser, setIsNewUser] = useState(false);
      const SPORTS = ["NBA", "NFL", "NHL", "NCAAB", "MLB"];

      // Generate a 6-digit OTP and store it so we can verify
      const [sentOtp] = useState(() => String(Math.floor(100000 + Math.random() * 900000)));

      const Spinner = () => (
        <span style={{ width: 16, height: 16, border: "2px solid rgba(255,255,255,0.3)", borderTopColor: "#fff", borderRadius: "50%", display: "inline-block", animation: "spin 0.7s linear infinite" }} />
      );

      const sendCode = async () => {
        if (!email || !email.includes("@") || !email.includes(".")) { setError("Enter a valid email address"); return; }
        setLoading(true);
        await new Promise(r => setTimeout(r, 900));
        // Check if returning user
        const users = JSON.parse(localStorage.getItem("algobets_users") || "[]");
        const exists = !!users.find(u => u.email?.toLowerCase() === email.toLowerCase());
        setIsNewUser(!exists);
        setLoading(false);
        setError("");
        setPhase("code");
        // In production: call your email OTP service (Supabase, Firebase, Auth0, etc.)
        // OTP sent via email in production
      };

      const verifyCode = async () => {
        if (code.length !== 6) { setError("Enter the 6-digit code"); return; }
        if (code !== sentOtp) { setError("Incorrect code — check browser console for demo code"); return; }
        setError("");
        if (isNewUser) {
          // New user — collect username
          setPhase("username");
        } else {
          // Returning user — sign them in
          setLoading(true);
          await new Promise(r => setTimeout(r, 500));
          const users = JSON.parse(localStorage.getItem("algobets_users") || "[]");
          const user = users.find(u => u.email?.toLowerCase() === email.toLowerCase());
          localStorage.setItem("algobets_currentUser", JSON.stringify(user));
          setLoading(false);
          onDone(user);
        }
      };

      const createAccount = async () => {
        if (!username || username.length < 3) { setError("Username must be at least 3 characters"); return; }
        if (!/^[a-zA-Z0-9_]+$/.test(username)) { setError("Letters, numbers and underscores only"); return; }
        setLoading(true);
        const users = JSON.parse(localStorage.getItem("algobets_users") || "[]");
        if (users.find(u => u.username?.toLowerCase() === username.toLowerCase())) {
          setError("That username is taken — try another"); setLoading(false); return;
        }
        await new Promise(r => setTimeout(r, 700));
        const newUser = { username, email, favSport, plan: "free", joinedAt: new Date().toISOString(), authMethod: "email" };
        users.push(newUser);
        localStorage.setItem("algobets_users", JSON.stringify(users));
        localStorage.setItem("algobets_currentUser", JSON.stringify(newUser));
        setLoading(false);
        onDone(newUser);
      };

      const PrimaryBtn = ({ label, onClick, disabled }) => (
        <button onClick={onClick} disabled={disabled || loading}
          style={{ width: "100%", padding: "15px", background: (!disabled && !loading) ? "linear-gradient(135deg,#0891b2,#7c3aed)" : "rgba(255,255,255,0.08)", border: "none", borderRadius: 50, color: "#fff", fontWeight: 800, fontSize: 15, cursor: (!disabled && !loading) ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center", gap: 10, transition: "background 0.2s", opacity: loading ? 0.7 : 1 }}>
          {loading ? <><Spinner />{" "}Loading...</> : label}
        </button>
      );

      const backAction = () => {
        if (phase === "email") { onBack(); return; }
        if (phase === "code") { setPhase("email"); setCode(""); setError(""); return; }
        if (phase === "username") { setPhase("code"); setError(""); return; }
      };

      return (
        <div style={{ minHeight: "100dvh", background: "#09090b", display: "flex", flexDirection: "column", padding: "52px 24px 40px", animation: "fadein 0.25s ease", overflowY: "auto" }}>
          {/* Back button */}

            <SVG d="M15 19l-7-7 7-7" size={18} /> Back
          </button>

          {/* ── Step 1: Email entry ── */}
          {phase === "email" && (
            <>
              <h2 style={{ fontSize: 26, fontWeight: 900, color: "#fff", letterSpacing: -0.3, marginBottom: 6 }}>What's your email?</h2>
              <p style={{ fontSize: 14, color: "#6b7280", marginBottom: 32, lineHeight: 1.5 }}>We'll send you a sign-in code. No password needed.</p>
              <AuthInput type="email" value={email} onChange={v => { setEmail(v); setError(""); }} placeholder="you@example.com" error={error} autoFocus />
              <PrimaryBtn label="Send Code" onClick={sendCode} />
            </>
          )}

          {/* ── Step 2: OTP code entry ── */}
          {phase === "code" && (
            <>
              <div style={{ marginBottom: 32 }}>
                <h2 style={{ fontSize: 26, fontWeight: 900, color: "#fff", letterSpacing: -0.3, marginBottom: 6 }}>Check your email</h2>
                <p style={{ fontSize: 14, color: "#6b7280", lineHeight: 1.5 }}>
                  We sent a 6-digit code to{" "}
                  <span style={{ color: "#e5e7eb", fontWeight: 600 }}>{email}</span>
                </p>
              </div>

              {/* Big OTP input boxes — Outlier's exact pattern */}
              <div style={{ display: "flex", gap: 10, marginBottom: 8, justifyContent: "center" }}>
                {Array.from({ length: 6 }).map((_, i) => (
                  <div key={i} style={{ width: 46, height: 56, borderRadius: 12, border: `2px solid ${code[i] ? "#22d3ee" : "rgba(255,255,255,0.15)"}`, background: "rgba(255,255,255,0.05)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, fontWeight: 800, color: "#fff", transition: "border-color 0.15s" }}>
                    {code[i] || ""}
                  </div>
                ))}
              </div>
              {/* Hidden real input that captures keystrokes */}
              <input
                type="number" value={code} onChange={e => { setCode(e.target.value.slice(0, 6)); setError(""); }}
                autoFocus maxLength={6}
                style={{ position: "absolute", opacity: 0, width: 1, height: 1, pointerEvents: "none" }}
              />

              <div onClick={() => document.querySelector('input[type="number"]')?.focus()}

              {!error && <div style={{ marginBottom: 24 }} />}

              <PrimaryBtn label={isNewUser ? "Continue" : "Sign In"} onClick={verifyCode} disabled={code.length !== 6} />

              </button>
              <p style={{ textAlign: "center", fontSize: 11, color: "#374151", marginTop: 8 }}>💡 Demo: OTP logged to browser console</p>
            </>
          )}

          {/* ── Step 3: New user — pick username ── */}
          {phase === "username" && (
            <>
              <h2 style={{ fontSize: 26, fontWeight: 900, color: "#fff", letterSpacing: -0.3, marginBottom: 6 }}>Pick a username</h2>
              <p style={{ fontSize: 14, color: "#6b7280", marginBottom: 32, lineHeight: 1.5 }}>This shows on the leaderboard and your picks.</p>
              <AuthInput value={username} onChange={v => { setUsername(v); setError(""); }} placeholder="e.g. SharpWilly" error={error} autoFocus />

              <div style={{ marginBottom: 28 }}>
                <p style={{ fontSize: 12, fontWeight: 600, color: "#6b7280", marginBottom: 12 }}>Favorite sport <span style={{ color: "#374151" }}>(optional)</span></p>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {SPORTS.map(s => (
                    <button key={s} onClick={() => setFavSport(favSport === s ? "" : s)}
                      style={{ padding: "8px 16px", borderRadius: 99, fontSize: 13, fontWeight: 700, background: favSport === s ? "linear-gradient(135deg,#0891b2,#7c3aed)" : "rgba(255,255,255,0.06)", border: favSport === s ? "none" : "1px solid rgba(255,255,255,0.1)", color: favSport === s ? "#fff" : "#9ca3af", cursor: "pointer" }}>{s}</button>
                  ))}
                </div>
              </div>

              <PrimaryBtn label="Create Account" onClick={createAccount} />
              <p style={{ textAlign: "center", fontSize: 11, color: "#374151", marginTop: 16, lineHeight: 1.6 }}>
                By continuing you agree to our{" "}
                <span style={{ color: "#6b7280", textDecoration: "underline" }}>Terms</span> &{" "}
                <span style={{ color: "#6b7280", textDecoration: "underline" }}>Privacy Policy</span>
              </p>
            </>
          )}
        </div>
      );
    }

    // ── Main auth screen ──────────────────────────────────────────────────────────
    function SplashScreen({ onDone }) {
      const [step, setStep] = useState("splash"); // splash | main | phone | email
      const [socialLoading, setSocialLoading] = useState(null); // "google" | "apple" | "facebook" | null

      useEffect(() => {
        if (step === "splash") {
          const t = setTimeout(() => setStep("main"), 1800);
          return () => clearTimeout(t);
        }
      }, [step]);

      // ── Facebook SDK init (runs once when auth screen appears) ─────────────────
      useEffect(() => {
        if (FACEBOOK_APP_ID !== "YOUR_FACEBOOK_APP_ID" && typeof window !== "undefined") {
          window.fbAsyncInit = function() {
            try {
              FB.init({ appId: FACEBOOK_APP_ID, cookie: true, xfbml: false, version: "v19.0" });
            } catch (e) { console.warn("FB init error:", e); }
          };
        }
      }, []);

      // ── Shared helper: persist user and notify parent ─────────────────────────
      const persistAndDone = (userObj) => {
        localStorage.setItem("algobets_currentUser", JSON.stringify(userObj));
        const users = JSON.parse(localStorage.getItem("algobets_users") || "[]");
        if (!users.find(u => u.email === userObj.email)) {
          users.push(userObj);
          localStorage.setItem("algobets_users", JSON.stringify(users));
        }
        setSocialLoading(null);
        onDone(userObj);
      };

      // ── Google Sign-In via Google Identity Services ────────────────────────────
      const handleGoogleAuth = () => {
        setSocialLoading("google");
        const isDemo = GOOGLE_CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";
        if (isDemo || !window.google?.accounts?.id) {
          // Demo / GSI not loaded — simulate login
          setTimeout(() => {

    // ─── PROFILE MODAL ────────────────────────────────────────────────────────────
    function ProfileModal({ user, userPlan, onPaywall, onLogout, onClose }) {
      const bets = (() => { try { return JSON.parse(localStorage.getItem("algobets_bets") || "[]"); } catch { return []; } })();
      const wins = bets.filter(b => b.outcome === "win").length;
      const losses = bets.filter(b => b.outcome === "loss").length;
      const pnl = bets.reduce((a, b) => {
        const s = parseFloat(b.stake) || 0;
        if (b.outcome === "win") { const raw = parseInt(b.odds?.replace("+", "") || "0"); return a + s * (b.odds?.startsWith("+") ? raw / 100 : 100 / Math.abs(raw)); }
        if (b.outcome === "loss") return a - s;
        return a;
      }, 0);
      const winRate = bets.filter(b => b.outcome !== "pending").length > 0 ? Math.round(wins / bets.filter(b => b.outcome !== "pending").length * 100) : 0;
      const avatarLetter = (user?.username || "G")[0].toUpperCase();

              </div>

                <button onClick={() => { onClose(); onPaywall(); }} style={{ background: "linear-gradient(135deg,#0891b2,#7c3aed)", border: "none", borderRadius: 10, padding: "9px 16px", color: "#fff", fontWeight: 800, fontSize: 13, cursor: "pointer" }}>Upgrade →</button>

    // ─── PWA INSTALL BANNER ───────────────────────────────────────────────────────
    function PWAInstallBanner({ onDismiss }) {
      const [visible, setVisible] = useState(false);
      const [installed, setInstalled] = useState(false);
      const [installing, setInstalling] = useState(false);

      useEffect(() => {
        // Show if install prompt is already captured
        if (window.__pwaInstallPrompt) setVisible(true);
        // Or listen for it to arrive
        const onReady = () => setVisible(true);
        const onInstalled = () => { setInstalled(true); setTimeout(() => { setVisible(false); onDismiss?.(); }, 2000); };
        window.addEventListener("pwaInstallReady", onReady);
        window.addEventListener("pwaInstalled", onInstalled);
        return () => {
          window.removeEventListener("pwaInstallReady", onReady);
          window.removeEventListener("pwaInstalled", onInstalled);
        };
      }, []);

      const handleInstall = async () => {
        const prompt = window.__pwaInstallPrompt;
        if (!prompt) return;
        setInstalling(true);
        try {
          await prompt.prompt();
          const { outcome } = await prompt.userChoice;
          if (outcome === "accepted") {
            setInstalled(true);
            window.__pwaInstallPrompt = null;
          } else {
            setInstalling(false);
          }
        } catch {
          setInstalling(false);
        }
      };

      const dismiss = () => { setVisible(false); onDismiss?.(); try { localStorage.setItem("ab_pwa_dismissed", "1"); } catch {} };

      // Don't show if already dismissed this session
      const wasDismissed = (() => { try { return localStorage.getItem("ab_pwa_dismissed") === "1"; } catch { return false; } })();
      if (!visible || wasDismissed) return null;

      return (
        <div style={{ position: "fixed", bottom: 80, left: "50%", transform: "translateX(-50%)", width: "calc(100% - 32px)", maxWidth: 440, zIndex: 300, animation: "fadein 0.3s ease" }}>
          <div style={{ background: "linear-gradient(135deg,#0c1a1f,#0f0a1e)", border: "1px solid rgba(34,211,238,0.25)", borderRadius: 16, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, boxShadow: "0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(34,211,238,0.08)" }}>
            {/* Icon */}
            <div style={{ width: 44, height: 44, borderRadius: 12, background: "linear-gradient(135deg,#0891b2,#7c3aed)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>⚡</div>

            {/* Text */}
            <div style={{ flex: 1, minWidth: 0 }}>
              {installed ? (
                <>
                  <p style={{ fontSize: 13, fontWeight: 800, color: "#4ade80" }}>✓ Added to Home Screen!</p>
                  <p style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>Algobets is now on your device</p>
                </>
              ) : (
                <>
                  <p style={{ fontSize: 13, fontWeight: 800, color: "#fff" }}>Add Algobets to Home Screen</p>
                  <p style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>Instant access · works offline · no App Store needed</p>
                </>
              )}
            </div>

            {/* Actions */}
            {!installed && (
              <div style={{ display: "flex", flexDirection: "column", gap: 6, flexShrink: 0 }}>
                <button onClick={handleInstall} disabled={installing}
                  style={{ padding: "7px 14px", background: "linear-gradient(135deg,#0891b2,#7c3aed)", border: "none", borderRadius: 9, color: "#fff", fontWeight: 800, fontSize: 12, cursor: installing ? "wait" : "pointer", whiteSpace: "nowrap" }}>
                  {installing ? "Adding..." : "Add App"}
                </button>
                <button onClick={dismiss}
                  style={{ padding: "5px", background: "none", border: "none", color: "#4b5563", fontSize: 11, cursor: "pointer", textAlign: "center" }}>
                  Not now
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────────
    function Page() {
      const [appState, setAppState] = useState("loading"); // loading | auth | app
      const [currentUser, setCurrentUser] = useState(null);
      const [activeTab, setActiveTab] = useState("picks");
      const [picks, setPicks] = useState([]);
      const [parlay, setParlay] = useState([]);
      const [scanning, setScanning] = useState(false);
      const [remainingPicks, setRemainingPicks] = useState(3);
      const [userPlan, setUserPlan] = useState("free");
      const [showPaywall, setShowPaywall] = useState(false);
      const [shareTarget, setShareTarget] = useState(null);
      const [showProfile, setShowProfile] = useState(false);
      const [scanTimestamp, setScanTimestamp] = useState(null);
      const [backendAlive, setBackendAlive] = useState(null); // null=unknown, true=live, false=demo
      const [showOnboarding, setShowOnboarding] = useState(false);
      const [showStateSelector, setShowStateSelector] = useState(false);

      useEffect(() => {
        // Check if already logged in
        try {
          const saved = localStorage.getItem("algobets_currentUser");
          if (saved) {
            const user = JSON.parse(saved);
            setCurrentUser(user);
            initApp(user);
            setAppState("app");
          } else {
            setAppState("auth");
          }
        } catch {
          setAppState("auth");
        }
      }, []);

      // ─── PAYMENT REDIRECT HANDLING ───────────────────────────────────────────────
      const usePaymentRedirect = () => {
        const [paymentStatus, setPaymentStatus] = useState(null);
        
        useEffect(() => {
          const params = new URLSearchParams(window.location.search);
          const payment = params.get("payment");
          const plan = params.get("plan");
          const sessionId = params.get("session_id");
          
          if (payment === "success") {
            setPaymentStatus({ type: "success", plan: plan || "pro" });
            // Clear the URL params
            window.history.replaceState({}, document.title, window.location.pathname);
          } else if (payment === "cancelled") {
            setPaymentStatus({ type: "cancelled" });
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        }, []);
        
        return paymentStatus;
      };

      // Verify and unlock after successful payment
      const verifyAndUnlock = async (planId, maxAttempts = 10) => {
        const userId = currentUser?.email || currentUser?.username;
        if (!userId) return false;
        
        for (let i = 0; i < maxAttempts; i++) {
          try {
            const status = await checkUserPlan(userId);
            if (status.plan === planId && status.isActive) {
              setUserPlan(planId);
              localStorage.setItem("algobets_plan", planId);
              localStorage.removeItem("algobets_pending_plan");
              showToast(`✅ Welcome to ${planId.charAt(0).toUpperCase() + planId.slice(1)}!`, "success", 5000);
              return true;
            }
          } catch (err) {
            console.warn(`Verification attempt ${i + 1} failed:`, err);
          }
          
          // Wait before retrying (exponential backoff)
          await new Promise(r => setTimeout(r, 1000 * Math.pow(1.5, i)));
        }
        
        showToast("⚠️ Payment verified but sync delayed. Refresh in a moment.", "info", 5000);
        return false;
      };

      const initApp = async (user) => {
        // Check plan with backend verification
        const userId = user?.email || user?.username;
        if (userId) {
          try {
            const status = await checkUserPlan(userId, (newPlan) => {
              setUserPlan(newPlan);
            });
            setUserPlan(status.plan);
          } catch (err) {
            console.warn("Plan check failed, using local:", err);
            const plan = user?.plan || localStorage.getItem("algobets_plan") || "free";
            setUserPlan(plan);
          }
        } else {
          const plan = user?.plan || localStorage.getItem("algobets_plan") || "free";
          setUserPlan(plan);
        }
        
        const today = new Date().toISOString().split("T")[0];
        const saved = localStorage.getItem("algobets_resetDate");
        if (saved !== today) {
          localStorage.setItem("algobets_resetDate", today);
          localStorage.setItem("algobets_remainingPicks", "3");
          setRemainingPicks(3);
        } else {
          setRemainingPicks(parseInt(localStorage.getItem("algobets_remainingPicks") || "3", 10));
        }
        // Load cached scan (valid for 30 min)
        try {
          const cached = JSON.parse(localStorage.getItem("algobets_lastScan") || "null");
          if (cached && cached.picks && Date.now() - cached.timestamp < 30 * 60 * 1000) {
            setPicks(cached.picks.map((p, i) => ({ ...p, affiliateBoost: getPickAffiliate(p, i) })));
            setScanTimestamp(cached.timestamp);
          }
        } catch {}
      };

      const handleAuthDone = async (user) => {
        setCurrentUser(user);
        await initApp(user);
        setAppState("app");
        // Show onboarding for brand-new users (no prior scan or bet history)
        const isNew = !localStorage.getItem("algobets_onboarding_done");
        if (isNew) {
          setShowOnboarding(true);
        }
      };

      // Handle payment redirect
      const paymentStatus = usePaymentRedirect();
      
      useEffect(() => {
        if (paymentStatus?.type === "success") {
          verifyAndUnlock(paymentStatus.plan);
        } else if (paymentStatus?.type === "cancelled") {
          showToast("Payment cancelled. You can upgrade anytime!", "info", 4000);
        }
      }, [paymentStatus]);
      
      // Periodic plan verification for Pro/Sharp users
      usePlanVerifier(currentUser?.email || currentUser?.username, (newPlan) => {
        setUserPlan(newPlan);
        if (newPlan === "free" && userPlan !== "free") {
          showToast("Your subscription has ended.", "info", 5000);
        }
      }, 60000); // Check every minute

      const handleLogout = () => {
        localStorage.removeItem("algobets_currentUser");
        setCurrentUser(null);
        setShowProfile(false);
        setPicks([]);
        setParlay([]);
        setAppState("auth");
      };

      const [scanStage, setScanStage] = useState(null); // null | "waking" | "scanning" | "analyzing"

      // ── All odds fetching happens server-side. No API key in browser. ──
      const scanNow = async () => {
        if (userPlan === "free" && remainingPicks <= 0) { setShowPaywall(true); return; }
        setScanning(true);
        setScanStage("waking");
        // Realistic cold-start progress messages
        const stageTimer1 = setTimeout(() => setScanStage("scanning"), 2500);
        const stageTimer2 = setTimeout(() => setScanStage("analyzing"), 6000);
        try {
          const controller = new AbortController();
          const t = setTimeout(() => controller.abort(), 15000);
          const res = await fetch(`${BACKEND}/scan`, { method: "GET", signal: controller.signal });
          clearTimeout(t); clearTimeout(stageTimer1); clearTimeout(stageTimer2);

          if (!res.ok) throw new Error(`Backend ${res.status}`);
          const data = await res.json();

          // Backend returns fully-analyzed picks — no client-side odds processing needed
          const picks = (data.consensus_picks || DEMO_PICKS).map((p, i) => ({
            id: p.id || i + 1,
            sport: p.sport || "NBA",

            affiliateBoost: getPickAffiliate(p, i),

          setPicks(picks);
          setScanTimestamp(Date.now());
          setBackendAlive(true);
          localStorage.setItem("algobets_lastScan", JSON.stringify({ picks, timestamp: Date.now() }));

        } catch (err) {

          </div>

          {/* Modals */}
          {showPaywall && <PaywallModal onClose={() => setShowPaywall(false)} onUnlock={p => setUserPlan(p)} />}
          {shareTarget && <ShareCard pick={shareTarget} onClose={() => setShareTarget(null)} />}
          {showProfile && <ProfileModal user={currentUser} userPlan={userPlan} onPaywall={() => { setShowProfile(false); setShowPaywall(true); }} onLogout={handleLogout} onClose={() => setShowProfile(false)} />}
          {showOnboarding && (
            <OnboardingCarousel onDone={() => {
              setShowOnboarding(false);
              localStorage.setItem("algobets_onboarding_done", "1");
              // After onboarding, show state selector if not set
              const existingState = (() => { try { return localStorage.getItem("ab_user_state") || ""; } catch { return ""; } })();
              if (!existingState) setShowStateSelector(true);
            }} />
          )}
          {showStateSelector && (
            <StateSelectorModal onDone={(state) => {
              setShowStateSelector(false);
              if (state) showToast(`📍 Showing books available in ${state}`, "success", 3000);
            }} />
          )}
          {/* PWA install banner — auto-shows when browser fires beforeinstallprompt */}
          {!showOnboarding && !showStateSelector && !showPaywall && (
            <PWAInstallBanner />
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Page />);
    </script>
</body>

</html>
