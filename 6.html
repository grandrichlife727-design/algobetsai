<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algobets Ai — Smart Picks</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0ff;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #00d4ff; }
    .pick {
      background: #111122;
      border: 1px solid #333366;
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #8888aa;
    }
    button {
      background: #00d4ff;
      color: black;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #00b7e0; }
  </style>
</head>
<body>

<h1>Algobets Ai</h1>
<button onclick="doScan()">Scan Now</button>

<div id="status">Waiting for scan…</div>
<div id="picks"></div>

<script>
let PICKS = [];

async function doScan() {
  const status = document.getElementById('status');
  const container = document.getElementById('picks');
  
  status.textContent = "Scanning…";
  
  try {
    // Point this to your real Render backend URL after deploy
    // For local testing you can use: http://127.0.0.1:8000/scan
    const res = await fetch("https://your-render-app.onrender.com/scan");
    const data = await res.json();
    
    PICKS = data.consensus_picks || [];
    
    if (PICKS.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <h2>No real edges right now</h2>
          <p>Live scan from real sources.<br>Try again in a few minutes — lines change constantly.</p>
        </div>`;
    } else {
      container.innerHTML = PICKS.map(p => `
        <div class="pick">
          <strong>${p.game}</strong><br>
          <span style="color:#00ffaa">${p.bet} @ ${p.odds}</span><br>
          Edge: <strong>+${p.edge}%</strong> • Confidence: <strong>${p.confidence}%</strong><br>
          <small>${p.explain}</small><br>
          <small>Book: ${p.book} • Grade: ${p.grade}</small>
        </div>
      `).join('');
    }
    
    status.textContent = `Updated: ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    status.textContent = "Error: " + err.message;
    container.innerHTML = `<div class="empty">Could not connect to backend</div>`;
  }
}

// Optional: auto-scan when page loads
// doScan();
</script>

</body>
</html>
