services:
  - type: web
    name: algobets-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: algobets-data
      mountPath: /data        # SQLite picks.db + disk cache live here
      sizeGB: 1               # 1GB is plenty — upgrade later if needed
    envVars:
      # ── Odds API (EV finder + arb only) ──────────────────────────────────
      - key: ODDS_API_KEY
        sync: false           # paste key in Render dashboard

      # ── Stripe ────────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_IDS
        sync: false           # comma-separated, e.g. price_abc,price_def
      - key: STRIPE_SHARP_PRICE_IDS
        sync: false

      # ── Anthropic (optional — reserved for future AI chat upgrade) ──────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── App config ────────────────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://algobets.ai
      - key: BACKEND_API_KEY
        sync: false           # generate: python3 -c "import secrets; print(secrets.token_hex(32))"
      - key: ALLOWED_ORIGINS
        value: https://algobets.app,https://algobets.ai,https://edgebet.app

      # ── Storage paths (uses the /data persistent disk above) ──────────────
      - key: DATA_DIR
        value: /data/algobets
      - key: CACHE_DIR
        value: /data/algobets/cache

      # ── Bookmaker filter (Odds API calls only) ─────────────────────────────
      # Limiting to 6 books keeps credit cost low. Add/remove as needed.
      - key: ODDS_BOOKMAKERS
        value: draftkings,fanduel,betmgm,pinnacle,williamhill_us,bovada
